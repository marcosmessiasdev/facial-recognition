<!DOCTYPE html>
<html>
<head>
    <title>Test Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <!-- Muted is necessary for autoplay to work without user interaction in modern browsers -->
    <video autoplay loop muted playsinline>
        <source src="faces.mp4" type="video/mp4">
    </video>
</body>
</html>
