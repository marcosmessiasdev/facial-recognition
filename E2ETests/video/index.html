<!DOCTYPE html>
<html>
<head>
    <title>Test Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        .grid {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 6px;
            padding: 6px;
            box-sizing: border-box;
        }
        .tile {
            position: relative;
            overflow: hidden;
            background: #111;
            border-radius: 8px;
        }
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.05) saturate(1.05);
        }
        .name {
            position: absolute;
            left: 10px;
            top: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 14px;
        }
        .mouth {
            position: absolute;
            left: 50%;
            bottom: 14%;
            transform: translateX(-50%);
            width: 26%;
            height: 7%;
            background: rgba(0,0,0,0.15);
            border-radius: 999px;
            transition: height 80ms linear, background 80ms linear;
        }
        .tile.speaking .mouth {
            height: 12%;
            background: rgba(0,0,0,0.35);
        }
        .hint {
            position: fixed;
            left: 10px;
            bottom: 10px;
            padding: 6px 10px;
            border-radius: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="grid" id="grid">
        <div class="tile" data-id="0">
            <img src="assets/face1.jpg" alt="Face 1" />
            <div class="name">Neil</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="1">
            <img src="assets/face2.jpg" alt="Face 2" />
            <div class="name">Buzz</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="2">
            <img src="assets/face3.jpg" alt="Face 3" />
            <div class="name">Sally</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="3">
            <img src="assets/face4.jpg" alt="Face 4" />
            <div class="name">Mae</div>
            <div class="mouth"></div>
        </div>
    </div>

    <div class="hint" id="hint">Click once to start audio (offline).</div>

    <audio id="audio" src="assets/speech.ogg" loop></audio>

    <script>
        const audio = document.getElementById('audio');
        const tiles = Array.from(document.querySelectorAll('.tile'));
        const hint = document.getElementById('hint');
        let started = false;

        function updateSpeaking() {
            if (!started) return;
            const t = audio.currentTime || 0;
            const active = Math.floor(t) % tiles.length;
            tiles.forEach((el, idx) => el.classList.toggle('speaking', idx === active));
            requestAnimationFrame(updateSpeaking);
        }

        async function start() {
            if (started) return;
            started = true;
            hint.textContent = 'Audio playing (loopback).';
            hint.style.opacity = '0.75';
            audio.volume = 1.0;
            try { await audio.play(); } catch { /* ignored */ }
            updateSpeaking();
        }

        window.addEventListener('pointerdown', start, { once: true });
    </script>
</body>
</html>
