<!DOCTYPE html>
<html>
<head>
    <title>E2E Faces Grid</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        }
        .grid {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 6px;
            padding: 6px;
            box-sizing: border-box;
        }
        .tile {
            position: relative;
            overflow: hidden;
            background: #111;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            filter: contrast(1.05) saturate(1.05);
            image-rendering: auto;
        }
        .name {
            position: absolute;
            left: 10px;
            top: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 14px;
        }
        .mouth {
            position: absolute;
            left: 50%;
            bottom: 14%;
            transform: translateX(-50%);
            width: 26%;
            height: 7%;
            background: rgba(0,0,0,0.15);
            border-radius: 999px;
            transition: height 80ms linear, background 80ms linear;
        }
        .tile.speaking .mouth {
            height: 12%;
            background: rgba(0,0,0,0.35);
            animation: mouthPulse 220ms ease-in-out infinite alternate;
        }
        @keyframes mouthPulse {
            from { transform: translateX(-50%) scaleY(0.65); }
            to { transform: translateX(-50%) scaleY(1.15); }
        }
        .hint {
            position: fixed;
            left: 10px;
            bottom: 10px;
            padding: 6px 10px;
            border-radius: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="grid" id="grid">
        <div class="tile" data-id="0">
            <img data-jpg="assets/face1.jpg" data-gif="assets/face1.gif" src="assets/face1.jpg" alt="Face 1" />
            <div class="name">Neil</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="1">
            <img data-jpg="assets/face2.jpg" data-gif="assets/face2.gif" src="assets/face2.jpg" alt="Face 2" />
            <div class="name">Buzz</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="2">
            <img data-jpg="assets/face3.jpg" data-gif="assets/face3.gif" src="assets/face3.jpg" alt="Face 3" />
            <div class="name">Sally</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="3">
            <img data-jpg="assets/face4.jpg" data-gif="assets/face4.gif" src="assets/face4.jpg" alt="Face 4" />
            <div class="name">Mae</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="4">
            <img data-jpg="assets/face1.jpg" data-gif="assets/face5.gif" src="assets/face1.jpg" alt="Face 5" />
            <div class="name">Ada</div>
            <div class="mouth"></div>
        </div>
        <div class="tile" data-id="5">
            <img data-jpg="assets/face2.jpg" data-gif="assets/face6.gif" src="assets/face2.jpg" alt="Face 6" />
            <div class="name">Grace</div>
            <div class="mouth"></div>
        </div>
    </div>

    <div class="hint" id="hint">Click once to start audio (offline). Options: ?gif=all | ?gif=speaker&speaker=1&rotate=0</div>

    <!-- Offline WAV fixture (contains a >=10-word sentence). -->
    <audio id="audio" src="../audio/e2e_fixture_10_words.wav" loop preload="auto"></audio>

    <script>
        const audio = document.getElementById('audio');
        const tiles = Array.from(document.querySelectorAll('.tile'));
        const hint = document.getElementById('hint');
        let started = false;
        let lastActive = -1;

        const url = new URL(window.location.href);
        const faces = parseInt(url.searchParams.get('faces') || '4', 10); // 4 | 6
        const targetFaces = (faces === 6) ? 6 : 4;
        const gifMode = (url.searchParams.get('gif') || 'speaker').toLowerCase(); // 'speaker' | 'all' | 'none'
        const speakerParam = parseInt(url.searchParams.get('speaker') || '1', 10);
        const preferredSpeaker = isFinite(speakerParam) ? Math.max(1, Math.min(targetFaces, speakerParam)) : 1;
        const rotate = (url.searchParams.get('rotate') || '0') !== '0';

        // Hide extra tiles and tune grid so the capture target always shows full faces (4 by default).
        const grid = document.getElementById('grid');
        const showTiles = tiles.slice(0, targetFaces);
        tiles.forEach((tile, idx) => {
            if (idx >= targetFaces) tile.style.display = 'none';
        });
        if (grid) {
            if (targetFaces === 4) {
                grid.style.gridTemplateColumns = '1fr 1fr';
                grid.style.gridTemplateRows = '1fr 1fr';
            } else {
                grid.style.gridTemplateColumns = '1fr 1fr 1fr';
                grid.style.gridTemplateRows = '1fr 1fr';
            }
        }

        const gifAvailability = new Map(); // url -> Promise<boolean>

        function ensureGifAvailableUrl(url) {
            if (!url) return Promise.resolve(false);
            const cached = gifAvailability.get(url);
            if (cached) return cached;
            const p = new Promise((resolve) => {
                const pre = new Image();
                pre.onload = () => resolve(true);
                pre.onerror = () => resolve(false);
                pre.src = url;
            });
            gifAvailability.set(url, p);
            return p;
        }

        function cacheBust(url) {
            if (!url) return url;
            const sep = url.includes('?') ? '&' : '?';
            return url + sep + 'v=' + Date.now();
        }

        function setImgMode(img, mode) {
            const jpg = img.getAttribute('data-jpg') || img.src;
            const gif = img.getAttribute('data-gif') || '';

            if (mode === 'gif') {
                if (img.dataset.targetMode === 'gif') return;
                img.dataset.targetMode = 'gif';
                ensureGifAvailableUrl(gif).then((ok) => {
                    if (img.dataset.targetMode !== 'gif') return;
                    const next = ok ? cacheBust(gif) : jpg;
                    if (img.dataset.currentSrc !== next) {
                        img.src = next;
                        img.dataset.currentSrc = next;
                    }
                    img.dataset.mode = ok ? 'gif' : 'jpg';
                });
                return;
            }

            // jpg
            if (img.dataset.targetMode === 'jpg') return;
            img.dataset.targetMode = 'jpg';
            if (img.dataset.currentSrc !== jpg) {
                img.src = jpg;
                img.dataset.currentSrc = jpg;
            }
            img.dataset.mode = 'jpg';
        }

        function applyGifPolicy(activeIdx) {
            showTiles.forEach((tile, idx) => {
                const img = tile.querySelector('img');
                if (!img) return;
                if (gifMode === 'all') setImgMode(img, 'gif');
                else if (gifMode === 'none') setImgMode(img, 'jpg');
                else setImgMode(img, idx === activeIdx ? 'gif' : 'jpg');
            });
        }

        function updateSpeaking() {
            if (!started) return;
            const t = audio.currentTime || 0;
            const active = rotate ? (Math.floor(t) % showTiles.length) : (preferredSpeaker - 1);
            if (active !== lastActive) {
                showTiles.forEach((el, idx) => el.classList.toggle('speaking', idx === active));
                applyGifPolicy(active);
                lastActive = active;
            }
            requestAnimationFrame(updateSpeaking);
        }

        async function start() {
            if (started) return;
            started = true;
            audio.volume = 1.0;
            audio.muted = false;
            audio.currentTime = 0;
            applyGifPolicy(preferredSpeaker - 1);
            try {
                await audio.play();
                hint.textContent = 'Audio playing (loopback).';
                hint.style.opacity = '0.75';
            } catch (err) {
                hint.textContent = 'Audio failed to start: ' + (err && err.message ? err.message : err);
            }
            updateSpeaking();
        }

        window.addEventListener('pointerdown', start, { once: true });

        // Show an animated "speaker" tile immediately (even before audio starts),
        // so the capture target has obvious motion for debugging.
        showTiles.forEach((el, idx) => el.classList.toggle('speaking', idx === (preferredSpeaker - 1)));
        applyGifPolicy(preferredSpeaker - 1);
    </script>
</body>
</html>
